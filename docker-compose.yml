services:
  # FastAPI Application Service
  api:
    build: .
    container_name: hyops_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Map the current local directory to /app in the container for hot-reloading
      # Local ./app/main.py maps to container /app/app/main.py
      - .:/app
    # fastapi dev watches the mounted source and auto-reloads on .py changes
    command: fastapi dev --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy

  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: hyops_db
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=app_password
      - POSTGRES_DB=app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: