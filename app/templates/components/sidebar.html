<!-- templates/components/sidebar.html -->
<style>
    /* Submenu indent and sizing */
    .sidebar .submenu {
        padding-left: 1rem;
    }
    /* Caret indicator for collapsible menus */
    .sidebar .nav-link[data-bs-toggle="collapse"]::after {
        content: '\25BC'; /* Down arrow */
        float: right;
        font-size: 0.7rem;
        margin-top: 0.3rem;
        transition: transform 0.2s ease-in-out;
    }
    .sidebar .nav-link[data-bs-toggle="collapse"][aria-expanded="false"]::after {
        transform: rotate(-90deg); /* Point right when closed */
    }
</style>

<nav class="sidebar bg-dark p-3 d-flex flex-column">
    <h4 class="text-white mb-4">HyOps</h4>
    <ul class="nav flex-column">
        
        <!-- ========================================== -->
        <!-- MAIN MENU 1: Main Data                    -->
        <!-- ========================================== -->
        <li class="nav-item">
            <!-- The toggle button. It stays active if any child page is active -->
            <a class="nav-link {% if current_page in ['organizations', 'users', 'subtypes', 'capabilities','features'] %}active{% endif %}" 
               data-bs-toggle="collapse" href="#mainDataMenu" role="button" 
               aria-expanded="{% if current_page in ['organizations', 'users', 'subtypes', 'capabilities','features'] %}true{% else %}false{% endif %}" 
               aria-controls="mainDataMenu">
                🗄️ Master Data
            </a>
            
            <!-- Submenu: Automatically opens if a child is the current_page -->
            <ul class="collapse {% if current_page in ['organizations', 'users', 'subtypes', 'capabilities','features'] %}show{% endif %} nav flex-column submenu" id="mainDataMenu">
                <li class="nav-item">
                    <a class="nav-link {% if current_page == 'organizations' %}active{% endif %}" href="/">🏢 Organizations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if current_page == 'users' %}active{% endif %}" href="/users-page">👥 Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if current_page == 'subtypes' %}active{% endif %}" href="/subtypes-page">⚙️ Subtypes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if current_page == 'capabilities' %}active{% endif %}" href="/capabilities-page">🧩 Capabilities</a>
                </li>

                <li class="nav-item">
                    <!-- Add this new link -->
                    <a class="nav-link {% if current_page == 'features' %}active{% endif %}" href="/features-page">🛠️ Features</a>
                </li>
            </ul>
        </li>

        <!-- ========================================== -->
        <!-- MAIN MENU 2: Projects & Operations        -->
        <!-- ========================================== -->
        <li class="nav-item">
            <a class="nav-link {% if current_page in ['projects'] %}active{% endif %}" 
               data-bs-toggle="collapse" href="#projectsMenu" role="button" 
               aria-expanded="{% if current_page in ['projects'] %}true{% else %}false{% endif %}" 
               aria-controls="projectsMenu">
                📁 Projects & Ops
            </a>
            
            <ul class="collapse {% if current_page in ['projects'] %}show{% endif %} nav flex-column submenu" id="projectsMenu">
                <li class="nav-item">
                    <a class="nav-link {% if current_page == 'projects' %}active{% endif %}" href="/projects-page">🚀 Projects</a>
                </li>
                <!-- You can add more project-related items here later, like Features or Documents -->
            </ul>
        </li>

    </ul>
</nav>
