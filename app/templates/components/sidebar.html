<!-- templates/components/sidebar.html -->
<style>
    /* Submenu indent and sizing */
    .sidebar .submenu {
        padding-left: 1rem;
    }
    /* Caret indicator for collapsible menus */
    .sidebar .nav-link[data-bs-toggle="collapse"]::after {
        content: '\25BC'; /* Down arrow */
        float: right;
        font-size: 0.7rem;
        margin-top: 0.3rem;
        transition: transform 0.2s ease-in-out;
    }
    .sidebar .nav-link[data-bs-toggle="collapse"][aria-expanded="false"]::after {
        transform: rotate(-90deg); /* Point right when closed */
    }
</style>

        <li class="nav-item">

                🗄️ Master Data
