<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom styles for the sidebar */
        .sidebar {
            width: 260px;
            flex-basis: 260px;   /* Sets the initial main size to 260px */
            flex-shrink: 0;      /* PREVENTS the sidebar from squeezing */
            min-height: 100vh;
        }
        
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.75);
            border-radius: 5px;
            margin-bottom: 5px;
        }
        
        .sidebar .nav-link:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #0d6efd;
        }

        .lang-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.2em 0.55em;
            margin: 1px 2px;
            border-radius: 0.375rem;
            background-color: #e9ecef;
            color: #495057;
        }

        /* Custom scrollable checkbox list */
        .language-checkbox-list {
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 0.5rem;
        }
        
        @media (max-width: 767.98px) {
            .sidebar {
                width: 100%;
                flex-basis: 100%;
                min-height: auto;
            }
        }
    </style>
</head>
<body class="bg-light">

<!-- Alpine.js Root Component -->
<div class="d-flex flex-md-row flex-column" x-data="orgManager()" x-init="init()">
    
    <!-- Left Sidebar Navbar -->
    {% include "components/sidebar.html" %}

    <!-- Main Content Area -->
    <main class="flex-grow-1 p-4  overflow-auto">
        <h1 class="mb-4">Organizations</h1>

        <!-- Form Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0" x-text="isEditing ? 'Edit Organization' : 'Add New Organization'"></h5>
            </div>
            <div class="card-body">
                <form @submit.prevent="submitForm()">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" x-model="form.name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="type" class="form-label">Type</label>
                            <select class="form-select" id="type" x-model="form.type" required>
                                <option value="customer">Customer</option>
                                <option value="partner">Partner</option>
                                <option value="internal">Internal</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" x-model="form.email" required>
                        </div>
                        <div class="col-md-4">
                            <label for="industry" class="form-label">Industry</label>
                            <input type="text" class="form-control" id="industry" x-model="form.industry" required>
                        </div>
                        <div class="col-md-4">
                            <label for="country" class="form-label">Country</label>
                            <input type="text" class="form-control" id="country" x-model="form.country" required>
                        </div>
                        <div class="col-md-4">
                            <label for="regions_operation" class="form-label">Regions of Operation</label>
                            <input type="text" class="form-control" id="regions_operation" x-model="form.regions_operation" placeholder="e.g. EMEA, APAC">
                        </div>
                        <div class="col-md-4">
                            <label for="number_subsidiaries" class="form-label">Number of Subsidiaries</label>
                            <input type="text" class="form-control" id="number_subsidiaries" x-model="form.number_subsidiaries" placeholder="e.g. 12">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Languages</label>
                            <div class="language-checkbox-list">
                                <template x-for="lang in availableLanguages" :key="lang.id">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" 
                                               :id="'lang-' + lang.code" 
                                               :value="lang.code" 
                                               x-model="form.selectedLanguages">
                                        <label class="form-check-label" :for="'lang-' + lang.code" x-text="lang.name"></label>
                                    </div>
                                </template>
                                <div x-show="availableLanguages.length === 0" class="text-muted small">
                                    Loading languages...
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="company_overview" class="form-label">Company Overview</label>
                            <textarea class="form-control" id="company_overview" x-model="form.company_overview" rows="3" placeholder="Brief overview of the company..."></textarea>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn" :class="isEditing ? 'btn-warning' : 'btn-primary'" x-text="isEditing ? 'Update Organization' : 'Create Organization'"></button>
                        <button type="button" class="btn btn-secondary" x-show="isEditing" @click="resetForm()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Organization List</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Email</th>
                                <th>Industry</th>
                                <th>Country</th>
                                <th>Regions</th>
                                <th>Subsidiaries</th>
                                <th>Languages</th>
                                <th>Overview</th>
                                <th style="width: 150px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr x-show="loading">
                                <td colspan="10" class="text-center text-muted py-4">Loading organizations...</td>
                            </tr>
                            <tr x-show="!loading && organizations.length === 0">
                                <td colspan="10" class="text-center text-muted py-4">No organizations found.</td>
                            </tr>
                            
                            <template x-for="org in organizations" :key="org.id">
                                <tr>
                                    <td class="fw-semibold" x-text="org.name"></td>
                                    <td>
                                        <span class="badge text-capitalize" :class="'bg-' + getTypeBadgeColor(org.type)" x-text="org.type"></span>
                                    </td>
                                    <td x-text="org.email"></td>
                                    <td x-text="org.industry"></td>
                                    <td x-text="org.country"></td>
                                    <td x-text="org.regions_operation || '—'"></td>
                                    <td x-text="org.number_subsidiaries || '—'"></td>
                                    <td>
                                        <template x-if="org.languages">
                                            <span>
                                                <template x-for="code in org.languages.split(',').map(l => l.trim()).filter(l => l)" :key="code">
                                                    <span class="lang-badge" x-text="getLanguageName(code)"></span>
                                                </template>
                                            </span>
                                        </template>
                                        <template x-if="!org.languages">
                                            <span class="text-muted">—</span>
                                        </template>
                                    </td>
                                    <td>
                                        <span x-data="{ full: org.company_overview || '', short: (org.company_overview || '').substring(0, 50) }">
                                            <span x-text="short + (full.length > 50 ? '…' : '') || '—'"></span>
                                        </span>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-warning" @click="editOrganization(org)">Edit</button>
                                        <button class="btn btn-sm btn-outline-danger" @click="deleteOrganization(org)">Delete</button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<script>
    function orgManager() {
        return {
            // State
            organizations: [],
            availableLanguages: [],
            loading: true,
            isEditing: false,
            form: {
                id: '',
                name: '',
                type: 'customer',
                email: '',
                industry: '',
                country: '',
                regions_operation: '',
                number_subsidiaries: '',
                company_overview: '',
                selectedLanguages: [] // Array to bind to checkboxes
            },

            // API Base URLs
            orgApiBase: "/organization",
            langApiBase: "/language",

            // Initialization
            async init() {
                await this.fetchLanguages();
                await this.fetchOrganizations();
            },

            // Fetch all available languages for the checkbox list
            async fetchLanguages() {
                try {
                    const response = await fetch(`${this.langApiBase}/languages`);
                    if (!response.ok) throw new Error("Failed to fetch languages");
                    this.availableLanguages = await response.json();
                } catch (error) {
                    console.error("Error fetching languages:", error);
                }
            },

            // Fetch all organizations
            async fetchOrganizations() {
                this.loading = true;
                try {
                    const response = await fetch(`${this.orgApiBase}/organizations`);
                    if (!response.ok) throw new Error("Failed to fetch");
                    this.organizations = await response.json();
                } catch (error) {
                    console.error(error);
                    alert("Error fetching organizations. Is the API running?");
                } finally {
                    this.loading = false;
                }
            },

            // Handle Create or Update
            async submitForm() {
                let payload = JSON.parse(JSON.stringify(this.form));

                // FIX: Strip server-managed fields to prevent asyncpg string-to-timestamp error
                delete payload.created_at;
                delete payload.updated_at;

                // Convert selectedLanguages array to comma-separated string for DB
                payload.languages = payload.selectedLanguages.join(',');
                delete payload.selectedLanguages;

                try {
                    if (this.isEditing) {
                        // UPDATE (PATCH)
                        const id = payload.id;
                        delete payload.id;

                        // Remove empty strings so backend exclude_none works properly
                        Object.keys(payload).forEach((k) => payload[k] === "" && delete payload[k]);

                        const response = await fetch(`${this.orgApiBase}/?id=${id}`, {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error("Failed to update");
                    } else {
                        // CREATE (POST)
                        delete payload.id;

                        // Remove empty optional strings on create
                        Object.keys(payload).forEach((k) => payload[k] === "" && delete payload[k]);

                        const response = await fetch(`${this.orgApiBase}/`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error("Failed to create");
                    }

                    this.resetForm();
                    await this.fetchOrganizations();
                } catch (error) {
                    console.error(error);
                    alert("Error saving organization.");
                }
            },

            // Populate form for editing
            editOrganization(org) {
                this.isEditing = true;
                this.form = JSON.parse(JSON.stringify(org));

                // Convert comma-separated string from DB back to array for checkboxes
                this.form.selectedLanguages = this.form.languages 
                    ? this.form.languages.split(',').map(l => l.trim()) 
                    : [];

                // Ensure all form keys exist
                this.form.regions_operation = this.form.regions_operation || '';
                this.form.number_subsidiaries = this.form.number_subsidiaries || '';
                this.form.company_overview = this.form.company_overview || '';
            },

            // Delete organization
            async deleteOrganization(org) {
                if (!confirm(`Are you sure you want to delete ${org.name}?`)) return;

                try {
                    const response = await fetch(`${this.orgApiBase}/?id=${org.id}`, {
                        method: "DELETE"
                    });

                    if (!response.ok) throw new Error("Failed to delete");
                    await this.fetchOrganizations();
                } catch (error) {
                    console.error(error);
                    alert("Error deleting organization.");
                }
            },

            // Reset form state
            resetForm() {
                this.isEditing = false;
                this.form = {
                    id: '',
                    name: '',
                    type: 'customer',
                    email: '',
                    industry: '',
                    country: '',
                    regions_operation: '',
                    number_subsidiaries: '',
                    company_overview: '',
                    selectedLanguages: []
                };
            },

            // Helper to color code the Type badge
            getTypeBadgeColor(type) {
                switch(type) {
                    case 'customer': return 'primary';
                    case 'partner': return 'success';
                    case 'internal': return 'info';
                    default: return 'secondary';
                }
            },

            // Helper to display language name from code in the table
            getLanguageName(code) {
                const lang = this.availableLanguages.find(l => l.code === code);
                return lang ? lang.name : code;
            }
        }
    }
</script>

</body>
</html>
