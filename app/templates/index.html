<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom styles for the sidebar */
        .sidebar {
            width: 260px;
            flex-basis: 260px;   /* Sets the initial main size to 260px */
            flex-shrink: 0;      /* PREVENTS the sidebar from squeezing */
            min-height: 100vh;
        }
        
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.75);
            border-radius: 5px;
            margin-bottom: 5px;
        }
        
        .sidebar .nav-link:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #0d6efd;
        }

        .lang-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.2em 0.55em;
            margin: 1px 2px;
            border-radius: 0.375rem;
            background-color: #e9ecef;
            color: #495057;
        }

        /* Custom scrollable checkbox list */
        .language-checkbox-list {
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 0.5rem;
        }
        
        @media (max-width: 767.98px) {
            .sidebar {
                width: 100%;
                flex-basis: 100%;
                min-height: auto;
            }
        }
    </style>
</head>
<body class="bg-light">

<!-- Alpine.js Root Component -->
<div class="d-flex flex-md-row flex-column" x-data="orgManager()" x-init="init()">
    
    <!-- Left Sidebar Navbar -->
    {% include "components/sidebar.html" %}

    <!-- Main Content Area -->
    <main class="flex-grow-1 p-4  overflow-auto">
        <h1 class="mb-4">Organizations</h1>

        <!-- Form Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0" x-text="isEditing ? 'Edit Organization' : 'Add New Organization'"></h5>
            </div>
            <div class="card-body">
                <form @submit.prevent="submitForm()">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" x-model="form.name" required>
                        </div>
                        <!-- Key — shown only in edit mode; auto-generated on create -->
                        <div class="col-md-2" x-show="isEditing">
                            <label for="orgKey" class="form-label">
                                Key
                                <span class="text-muted small">(2–7 letters)</span>
                            </label>
                            <input type="text" class="form-control font-monospace text-uppercase"
                                   id="orgKey"
                                   maxlength="7"
                                   placeholder="e.g. ACM"
                                   x-model="form.key"
                                   @input="form.key = form.key.toUpperCase().replace(/[^A-Z]/g, '')">
                        </div>
                        <div class="col-md-4">
                            <label for="type" class="form-label">Type</label>
                            <select class="form-select" id="type" x-model="form.type" required>
                                <option value="customer">Customer</option>
                                <option value="partner">Partner</option>
                                <option value="internal">Internal</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" x-model="form.email" required>
                        </div>
                        <!-- Industry -->
                        <div class="col-md-4">
                            <label for="industrySelect" class="form-label">Industry</label>
                            <select class="form-select" id="industrySelect"
                                    x-model="form.industrySelect" required>
                                <option value="">— Select industry —</option>
                                <template x-for="ind in industries" :key="ind">
                                    <option :value="ind" x-text="ind"></option>
                                </template>
                            </select>
                            <!-- Free-text input shown only when "Other" is chosen -->
                            <input type="text" class="form-control mt-2"
                                   x-show="form.industrySelect === 'Other'"
                                   x-model="form.industryOther"
                                   placeholder="Please specify your industry"
                                   :required="form.industrySelect === 'Other'">
                        </div>

                        <!-- Country -->
                        <div class="col-md-4">
                            <label for="countrySelect" class="form-label">Country</label>
                            <select class="form-select" id="countrySelect"
                                    x-model="form.country" required>
                                <option value="">— Select country —</option>
                                <template x-for="c in countries" :key="c.code">
                                    <option :value="c.code + ' - ' + c.name"
                                            x-text="c.code + ' - ' + c.name"></option>
                                </template>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="regions_operation" class="form-label">Regions of Operation</label>
                            <input type="text" class="form-control" id="regions_operation" x-model="form.regions_operation" placeholder="e.g. EMEA, APAC">
                        </div>
                        <div class="col-md-4">
                            <label for="number_subsidiaries" class="form-label">Number of Subsidiaries</label>
                            <input type="text" class="form-control" id="number_subsidiaries" x-model="form.number_subsidiaries" placeholder="e.g. 12">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Languages</label>
                            <div class="language-checkbox-list">
                                <template x-for="lang in availableLanguages" :key="lang.id">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" 
                                               :id="'lang-' + lang.code" 
                                               :value="lang.code" 
                                               x-model="form.selectedLanguages">
                                        <label class="form-check-label" :for="'lang-' + lang.code" x-text="lang.name"></label>
                                    </div>
                                </template>
                                <div x-show="availableLanguages.length === 0" class="text-muted small">
                                    Loading languages...
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="company_overview" class="form-label">Company Overview</label>
                            <textarea class="form-control" id="company_overview" x-model="form.company_overview" rows="3" placeholder="Brief overview of the company..."></textarea>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn" :class="isEditing ? 'btn-warning' : 'btn-primary'" x-text="isEditing ? 'Update Organization' : 'Create Organization'"></button>
                        <button type="button" class="btn btn-secondary" x-show="isEditing" @click="resetForm()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Organization List</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Key</th>
                                <th>Type</th>
                                <th>Email</th>
                                <th>Industry</th>
                                <th>Country</th>
                                <th>Regions</th>
                                <th>Subsidiaries</th>
                                <th>Languages</th>
                                <th>Overview</th>
                                <th style="width: 150px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr x-show="loading">
                                <td colspan="11" class="text-center text-muted py-4">Loading organizations...</td>
                            </tr>
                            <tr x-show="!loading && organizations.length === 0">
                                <td colspan="11" class="text-center text-muted py-4">No organizations found.</td>
                            </tr>
                            
                            <template x-for="org in organizations" :key="org.id">
                                <tr>
                                    <td class="fw-semibold" x-text="org.name"></td>

                                    <!-- Key — inline editable -->
                                    <td style="min-width:110px;">
                                        <!-- Display mode -->
                                        <template x-if="!org._editKey">
                                            <span class="badge bg-secondary font-monospace"
                                                  style="cursor:pointer; letter-spacing:.05em;"
                                                  title="Click to edit key"
                                                  @click="startEditKey(org)"
                                                  x-text="org.key || '—'">
                                            </span>
                                        </template>
                                        <!-- Edit mode -->
                                        <template x-if="org._editKey">
                                            <div>
                                                <div class="d-flex gap-1 align-items-center">
                                                    <input type="text"
                                                           class="form-control form-control-sm font-monospace text-uppercase"
                                                           style="width:80px;"
                                                           maxlength="7"
                                                           x-model="org._keyInput"
                                                           @input="org._keyInput = org._keyInput.toUpperCase().replace(/[^A-Z]/g, '')"
                                                           @keydown.enter="saveKey(org)"
                                                           @keydown.escape="org._editKey = false; org._keyErr = ''"
                                                           x-effect="if(org._editKey) $el.focus()">
                                                    <button class="btn btn-sm btn-primary px-1"
                                                            :disabled="org._keySaving || !org._keyInput"
                                                            @click="saveKey(org)">✓</button>
                                                    <button class="btn btn-sm btn-outline-secondary px-1"
                                                            @click="org._editKey = false; org._keyErr = ''">✗</button>
                                                </div>
                                                <div x-show="org._keyErr" class="small text-danger mt-1" x-text="org._keyErr"></div>
                                            </div>
                                        </template>
                                    </td>

                                    <td>
                                        <span class="badge text-capitalize" :class="'bg-' + getTypeBadgeColor(org.type)" x-text="org.type"></span>
                                    </td>
                                    <td x-text="org.email"></td>
                                    <td x-text="org.industry"></td>
                                    <td x-text="org.country"></td>
                                    <td x-text="org.regions_operation || '—'"></td>
                                    <td x-text="org.number_subsidiaries || '—'"></td>
                                    <td>
                                        <template x-if="org.languages">
                                            <span>
                                                <template x-for="code in org.languages.split(',').map(l => l.trim()).filter(l => l)" :key="code">
                                                    <span class="lang-badge" x-text="getLanguageName(code)"></span>
                                                </template>
                                            </span>
                                        </template>
                                        <template x-if="!org.languages">
                                            <span class="text-muted">—</span>
                                        </template>
                                    </td>
                                    <td>
                                        <span x-data="{ full: org.company_overview || '', short: (org.company_overview || '').substring(0, 50) }">
                                            <span x-text="short + (full.length > 50 ? '…' : '') || '—'"></span>
                                        </span>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-warning" @click="editOrganization(org)">Edit</button>
                                        <button class="btn btn-sm btn-outline-danger" @click="deleteOrganization(org)">Delete</button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

                {code:'SX',name:'Sint Maarten'},{code:'SY',name:'Syria'},{code:'SZ',name:'Eswatini'},
                {code:'TC',name:'Turks and Caicos Islands'},{code:'TD',name:'Chad'},{code:'TG',name:'Togo'},
                {code:'TH',name:'Thailand'},{code:'TJ',name:'Tajikistan'},{code:'TL',name:'Timor-Leste'},
                {code:'TM',name:'Turkmenistan'},{code:'TN',name:'Tunisia'},{code:'TO',name:'Tonga'},
                {code:'TR',name:'Turkey'},{code:'TT',name:'Trinidad and Tobago'},{code:'TV',name:'Tuvalu'},
                {code:'TW',name:'Taiwan'},{code:'TZ',name:'Tanzania'},
                {code:'UA',name:'Ukraine'},{code:'UG',name:'Uganda'},{code:'US',name:'United States'},
                {code:'UY',name:'Uruguay'},{code:'UZ',name:'Uzbekistan'},
                {code:'VA',name:'Vatican City'},{code:'VC',name:'Saint Vincent and the Grenadines'},
                {code:'VE',name:'Venezuela'},{code:'VG',name:'British Virgin Islands'},
                {code:'VI',name:'US Virgin Islands'},{code:'VN',name:'Vietnam'},{code:'VU',name:'Vanuatu'},
                {code:'WS',name:'Samoa'},
                {code:'YE',name:'Yemen'},{code:'YT',name:'Mayotte'},
                {code:'ZA',name:'South Africa'},{code:'ZM',name:'Zambia'},{code:'ZW',name:'Zimbabwe'},
            ],

            // API Base URLs
            orgApiBase: "/organization",
            langApiBase: "/language",

            // Initialization
            async init() {
                await this.fetchLanguages();
                await this.fetchOrganizations();
            },

            // Fetch all available languages for the checkbox list
            async fetchLanguages() {
                try {
                    const response = await fetch(`${this.langApiBase}/languages`);
                    if (!response.ok) throw new Error("Failed to fetch languages");
                    this.availableLanguages = await response.json();
                } catch (error) {
                    console.error("Error fetching languages:", error);
                }
            },

            // Fetch all organizations
            async fetchOrganizations() {
                this.loading = true;
                try {
                    const response = await fetch(`${this.orgApiBase}/organizations`);
                    if (!response.ok) throw new Error("Failed to fetch");
                    const raw = await response.json();
                    // Augment each org with inline-edit state for the Key column
                    this.organizations = raw.map(o => ({
                        ...o,
                        _editKey:   false,
                        _keyInput:  o.key || '',
                        _keyErr:    '',
                        _keySaving: false,
                    }));
                } catch (error) {
                    console.error(error);
                    alert("Error fetching organizations. Is the API running?");
                } finally {
                    this.loading = false;
                }
            },

            // Handle Create or Update
            async submitForm() {
                // Validate "Other" industry free text
                if (this.form.industrySelect === 'Other' && !this.form.industryOther.trim()) {
                    alert('Please specify your industry in the text field.');
                    return;
                }

                let payload = JSON.parse(JSON.stringify(this.form));

                // FIX: Strip server-managed fields to prevent asyncpg string-to-timestamp error
                delete payload.created_at;
                delete payload.updated_at;

                // Derive the actual industry value and remove UI-only fields
                payload.industry = payload.industrySelect === 'Other'
                    ? payload.industryOther.trim()
                    : payload.industrySelect;
                delete payload.industrySelect;
                delete payload.industryOther;

                // Convert selectedLanguages array to comma-separated string for DB
                payload.languages = payload.selectedLanguages.join(',');
                delete payload.selectedLanguages;

                try {
                    if (this.isEditing) {
                        // UPDATE (PATCH)
                        const id = payload.id;
                        delete payload.id;

                        // Remove empty strings so backend exclude_none works properly
                        Object.keys(payload).forEach((k) => payload[k] === "" && delete payload[k]);

                        const response = await fetch(`${this.orgApiBase}/?id=${id}`, {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error("Failed to update");
                    } else {
                        // CREATE (POST)
                        delete payload.id;

                        // Remove empty optional strings on create
                        Object.keys(payload).forEach((k) => payload[k] === "" && delete payload[k]);

                        const response = await fetch(`${this.orgApiBase}/`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error("Failed to create");
                    }

                    this.resetForm();
                    await this.fetchOrganizations();
                } catch (error) {
                    console.error(error);
                    alert("Error saving organization.");
                }
            },

            // Populate form for editing
            editOrganization(org) {
                this.isEditing = true;
                this.form = JSON.parse(JSON.stringify(org));

                // Convert comma-separated string from DB back to array for checkboxes
                this.form.selectedLanguages = this.form.languages
                    ? this.form.languages.split(',').map(l => l.trim())
                    : [];

                // Ensure all form keys exist
                this.form.regions_operation   = this.form.regions_operation   || '';
                this.form.number_subsidiaries = this.form.number_subsidiaries || '';
                this.form.company_overview    = this.form.company_overview    || '';
                this.form.key                 = this.form.key                 || '';

                // Industry: match against predefined list or fall back to "Other"
                const stored = org.industry || '';
                if (!stored) {
                    this.form.industrySelect = '';
                    this.form.industryOther  = '';
                } else if (this.industries.includes(stored)) {
                    this.form.industrySelect = stored;
                    this.form.industryOther  = '';
                } else {
                    this.form.industrySelect = 'Other';
                    this.form.industryOther  = stored;
                }

                // Country is already stored in "XX - Name" format;
                // the select will match automatically.
                this.form.country = org.country || '';
            },

            // Delete organization
            async deleteOrganization(org) {
                if (!confirm(`Are you sure you want to delete ${org.name}?`)) return;

                try {
                    const response = await fetch(`${this.orgApiBase}/?id=${org.id}`, {
                        method: "DELETE"
                    });

                    if (!response.ok) throw new Error("Failed to delete");
                    await this.fetchOrganizations();
                } catch (error) {
                    console.error(error);
                    alert("Error deleting organization.");
                }
            },

            // ── Inline key edit ───────────────────────────────────────────────

            startEditKey(org) {
                org._keyInput = org.key || '';
                org._keyErr   = '';
                org._editKey  = true;
            },

            async saveKey(org) {
                const key = (org._keyInput || '').trim().toUpperCase().replace(/[^A-Z]/g, '');

                // Client-side validation
                if (!key) {
                    org._keyErr = 'Key is required';
                    return;
                }
                if (key.length < 2 || key.length > 7) {
                    org._keyErr = 'Key must be 2–7 letters';
                    return;
                }

                org._keySaving = true;
                org._keyErr    = '';
                try {
                    const r = await fetch(`${this.orgApiBase}/?id=${org.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ key }),
                    });
                    const data = await r.json();
                    if (r.ok) {
                        org.key      = data.key;
                        org._editKey = false;
                    } else {
                        // 409 conflict, 422 validation, etc.
                        const detail = data.detail;
                        org._keyErr = typeof detail === 'string'
                            ? detail
                            : (detail?.msg || JSON.stringify(detail) || 'Error saving key');
                    }
                } catch(e) {
                    org._keyErr = 'Network error';
                } finally {
                    org._keySaving = false;
                }
            },

            // Reset form state
            resetForm() {
                this.isEditing = false;
                this.form = {
                    id: '',
                    name: '',
                    type: 'customer',
                    email: '',
                    industry: '',
                    industrySelect: '',
                    industryOther: '',
                    country: '',
                    regions_operation: '',
                    number_subsidiaries: '',
                    company_overview: '',
                    selectedLanguages: [],
                    key: '',
                };
            },

            // Helper to color code the Type badge
            getTypeBadgeColor(type) {
                switch(type) {
                    case 'customer': return 'primary';
                    case 'partner': return 'success';
                    case 'internal': return 'info';
                    default: return 'secondary';
                }
            },

            // Helper to display language name from code in the table
            getLanguageName(code) {
                const lang = this.availableLanguages.find(l => l.code === code);
                return lang ? lang.name : code;
            }
        }
    }
</script>
