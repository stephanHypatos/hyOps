<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .sidebar { width: 260px; min-height: 100vh; }
        .sidebar .nav-link { color: rgba(255,255,255,0.75); border-radius: 5px; margin-bottom: 5px; }
        .sidebar .nav-link:hover { color: #fff; background-color: rgba(255,255,255,0.1); }
        .sidebar .nav-link.active { color: #fff; background-color: #0d6efd; }
        .sidebar .submenu { padding-left: 1rem; }
        .sidebar .nav-link[data-bs-toggle="collapse"]::after { content: '\25BC'; float: right; font-size: 0.7rem; margin-top: 0.3rem; transition: transform 0.2s ease-in-out; }
        .sidebar .nav-link[data-bs-toggle="collapse"][aria-expanded="false"]::after { transform: rotate(-90deg); }
        @media (max-width: 767.98px) { .sidebar { width: 100%; min-height: auto; } }
    </style>
</head>
<body class="bg-light">
<div class="d-flex flex-md-row flex-column" x-data="roleManager()" x-init="load()">
    {% include "components/sidebar.html" %}
    <main class="flex-grow-1 p-4">
        <div class="d-flex align-items-center mb-4 gap-3">
            <h1 class="mb-0">🏷️ Roles</h1>
            <span class="badge bg-secondary fs-6" x-text="roles.length + ' roles'"></span>
        </div>
        <p class="text-muted mb-4">Define the roles users can be assigned. Used when adding users to organizations and projects.</p>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white d-flex align-items-center gap-2">
                <i class="bi" :class="isEditing ? 'bi-pencil-square text-warning' : 'bi-plus-circle text-primary'"></i>
                <h5 class="mb-0" x-text="isEditing ? 'Edit Role' : 'Add Role'"></h5>
            </div>
            <div class="card-body">
                <form @submit.prevent="submitForm()">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <label class="form-label fw-semibold">Role Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" x-model="form.name"
                                   placeholder="e.g. Project Manager" required>
                        </div>
                        <div class="col-md-7">
                            <label class="form-label fw-semibold">Description <span class="text-muted small">(optional)</span></label>
                            <input type="text" class="form-control" x-model="form.description"
                                   placeholder="Brief description of this role">
                        </div>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <button type="submit" class="btn" :class="isEditing ? 'btn-warning' : 'btn-primary'" :disabled="saving">
                            <span x-show="!saving" x-text="isEditing ? '✓ Update Role' : '+ Add Role'"></span>
                            <span x-show="saving">Saving…</span>
                        </button>
                        <button type="button" class="btn btn-outline-secondary" x-show="isEditing" @click="resetForm()">Cancel</button>
                    </div>
                    <div x-show="msg" class="mt-2 small" :class="ok ? 'text-success' : 'text-danger'" x-text="msg"></div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Role List</h5>
            </div>
            <div class="card-body p-0">
                <div x-show="loading" class="text-center text-muted py-4">Loading…</div>
                <div x-show="!loading && roles.length === 0" class="text-center text-muted py-4">No roles yet.</div>
                <div x-show="!loading && roles.length > 0" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Role Name</th>
                                <th>Description</th>
                                <th style="width:120px"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="role in roles" :key="role.id">
                                <tr>
                                    <td class="fw-semibold" x-text="role.name"></td>
                                    <td class="text-muted" x-text="role.description || '—'"></td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-outline-secondary me-1" @click="editRole(role)"><i class="bi bi-pencil"></i></button>
                                        <button class="btn btn-sm btn-outline-danger" @click="deleteRole(role)"><i class="bi bi-trash"></i></button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function roleManager() {
    return {
        roles: [], loading: true, isEditing: false, saving: false, msg: '', ok: true,
        form: { id: '', name: '', description: '' },
        apiBase: '/subtype',

        async load() {
            this.loading = true;
            try {
                const r = await fetch(`${this.apiBase}/subtypes`);
                this.roles = await r.json();
            } catch(e) { console.error(e); }
            finally { this.loading = false; }
        },

        async submitForm() {
            this.saving = true; this.msg = '';
            let payload = JSON.parse(JSON.stringify(this.form));
            try {
                if (this.isEditing) {
                    const id = payload.id;
                    Object.keys(payload).forEach(k => payload[k] === '' && delete payload[k]);
                    const r = await fetch(`${this.apiBase}/?id=${id}`, {
                        method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
                    });
                    if (!r.ok) throw new Error();
                    this.ok = true; this.msg = '✓ Role updated';
                } else {
                    delete payload.id;
                    if (!payload.description) delete payload.description;
                    const r = await fetch(`${this.apiBase}/`, {
                        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
                    });
                    if (!r.ok) throw new Error();
                    this.ok = true; this.msg = '✓ Role added';
                }
                this.resetForm();
                await this.load();
            } catch(e) {
                this.ok = false; this.msg = '✗ Error saving role';
            } finally { this.saving = false; }
        },

        editRole(role) {
            this.isEditing = true;
            this.form = JSON.parse(JSON.stringify(role));
            this.msg = '';
        },

        async deleteRole(role) {
            if (!confirm(`Delete role "${role.name}"?`)) return;
            try {
                const r = await fetch(`${this.apiBase}/?id=${role.id}`, { method: 'DELETE' });
                if (!r.ok) throw new Error();
                await this.load();
            } catch(e) {
                alert('Error deleting role. It may be assigned to a user.');
            }
        },

        resetForm() {
            this.isEditing = false;
            this.form = { id: '', name: '', description: '' };
            this.msg = '';
        },
    };
}
</script>
</body>
</html>
