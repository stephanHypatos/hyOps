<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            width: 260px;
            min-height: 100vh;
        }
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.75);
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .sidebar .nav-link:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #0d6efd;
        }
        @media (max-width: 767.98px) {
            .sidebar {
                width: 100%;
                min-height: auto;
            }
        }
    </style>
</head>
<body class="bg-light">

<!-- Alpine.js Root Component -->
<div class="d-flex flex-md-row flex-column" x-data="userManager()" x-init="initData()">
    
    <!-- Left Sidebar Navbar -->
     {% include "components/sidebar.html" %}

    <!-- Main Content Area -->
    <main class="flex-grow-1 p-4">
        <h1 class="mb-4">Users</h1>

        <!-- Form Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0" x-text="isEditing ? 'Edit User' : 'Add New User'"></h5>
            </div>
            <div class="card-body">
                <form @submit.prevent="submitForm()">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" x-model="form.first_name" required>
                        </div>
                        <div class="col-md-3">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" x-model="form.last_name" required>
                        </div>
                        <div class="col-md-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" x-model="form.email" required>
                        </div>
                        <div class="col-md-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" x-model="form.phone" required>
                        </div>
                        
                        <div class="col-md-3">
                            <label for="organization_id" class="form-label">Organization</label>
                            <select class="form-select" id="organization_id" x-model="form.organization_id" required>
                                <option value="" disabled selected>Select Organization...</option>
                                <template x-for="org in organizations" :key="org.id">
                                    <option :value="org.id" x-text="org.name"></option>
                                </template>
                            </select>
                        </div>

                        <!-- Subtype Dropdown -->
                        <div class="col-md-3">
                            <label for="subtype_id" class="form-label">Subtype</label>
                            <select class="form-select" id="subtype_id" x-model="form.subtype_id" required>
                                <option value="" disabled selected>Select Subtype...</option>
                                <template x-for="sub in subtypes" :key="sub.id">
                                    <option :value="sub.id" x-text="formatSubtypeName(sub.name)"></option>
                                </template>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label for="type" class="form-label">User Type</label>
                            <select class="form-select" id="type" x-model="form.type" required>
                                <option value="customer">Customer</option>
                                <option value="partner">Partner</option>
                                <option value="internal">Internal</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-select" id="role" x-model="form.role" required>
                                <option value="admin">Admin</option>
                                <option value="enduser">End User</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn" :class="isEditing ? 'btn-warning' : 'btn-primary'" x-text="isEditing ? 'Update User' : 'Create User'"></button>
                        <button type="button" class="btn btn-secondary" x-show="isEditing" @click="resetForm()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">User List</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Organization</th>
                                <th>Subtype</th> <!-- Added Subtype Column -->
                                <th>Type</th>
                                <th>Role</th>
                                <th style="width: 150px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr x-show="loading">
                                <td colspan="7" class="text-center text-muted py-4">Loading users...</td>
                            </tr>
                            <tr x-show="!loading && users.length === 0">
                                <td colspan="7" class="text-center text-muted py-4">No users found.</td>
                            </tr>
                            
                            <template x-for="user in users" :key="user.id">
                                <tr>
                                    <td class="fw-semibold" x-text="user.first_name + ' ' + user.last_name"></td>
                                    <td x-text="user.email"></td>
                                    <td x-text="getOrgName(user.organization_id)"></td>
                                    <td x-text="getSubtypeName(user.subtype_id)"></td> <!-- Display Subtype Name -->
                                    <td>
                                        <span class="badge text-capitalize" :class="'bg-' + getTypeBadgeColor(user.type)" x-text="user.type"></span>
                                    </td>
                                    <td>
                                        <span class="badge text-capitalize" :class="user.role === 'admin' ? 'bg-danger' : 'bg-secondary'" x-text="user.role"></span>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-warning" @click="editUser(user)">Edit</button>
                                        <button class="btn btn-sm btn-outline-danger" @click="deleteUser(user)">Delete</button>
                                        <button class="btn btn-sm btn-outline-secondary" @click="openIntegrations(user)">🔗</button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- ── User Integrations Modal ─────────────────────────────────────────────── -->
<div class="modal fade" id="userIntegrationsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">🔗 Integrations — <span id="intModalUserName"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="intModalBody">
                <!-- Metabase -->
                <div class="mb-4 p-3 border rounded">
                    <h6 class="fw-bold mb-2">📊 Metabase</h6>
                    <div id="mbStatus" class="mb-3 small"></div>

                    <!-- Group memberships -->
                    <div id="mbMemberships" class="mb-3"></div>

                    <button class="btn btn-sm btn-primary" id="btnProvisionMb">Provision to Metabase</button>
                    <div id="mbActionMsg" class="mt-2 small"></div>
                </div>
                <!-- Teams -->
                <div class="mb-4 p-3 border rounded">
                    <h6 class="fw-bold mb-3">💬 Microsoft Teams</h6>
                    <div id="teamsStatus" class="mb-2 small text-muted">—</div>
                    <button class="btn btn-sm btn-primary" id="btnAddTeams">Add to Teams</button>
                    <div id="teamsActionMsg" class="mt-2 small"></div>
                </div>
                <!-- Slack -->
                <div class="p-3 border rounded">
                    <h6 class="fw-bold mb-3">💬 Slack</h6>
                    <div id="slackStatus" class="mb-2 small text-muted">—</div>
                    <button class="btn btn-sm btn-primary" id="btnAddSlack">Add to Slack</button>
                    <div id="slackActionMsg" class="mt-2 small"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<script>
    function userManager() {
        return {
            // State
            users: [],
            organizations: [],
            subtypes: [], // Added subtypes state
            loading: true,
            isEditing: false,
            form: {
                id: '',
                organization_id: '',
                type: 'customer',
                subtype_id: '',
                role: 'enduser',
                first_name: '',
                last_name: '',
                email: '',
                phone: ''
            },

            // API Base URLs
            userApi: "/user",
            orgApi: "/organization",
            subtypeApi: "/subtype",

            // Initialization
            async initData() {
                // Fetch dropdown data first, then users
                await Promise.all([this.fetchOrganizations(), this.fetchSubtypes()]);
                await this.fetchUsers();
            },

            // Fetch all users
            async fetchUsers() {
                this.loading = true;
                try {
                    const response = await fetch(`${this.userApi}/users`);
                    if (!response.ok) throw new Error("Failed to fetch users");
                    this.users = await response.json();
                } catch (error) {
                    console.error(error);
                    alert("Error fetching users.");
                } finally {
                    this.loading = false;
                }
            },

            // Fetch organizations for the select dropdown
            async fetchOrganizations() {
                try {
                    const response = await fetch(`${this.orgApi}/organizations`);
                    if (!response.ok) throw new Error("Failed to fetch organizations");
                    this.organizations = await response.json();
                } catch (error) {
                    console.error(error);
                }
            },

            // Fetch subtypes for the select dropdown
            async fetchSubtypes() {
                try {
                    const response = await fetch(`${this.subtypeApi}/subtypes`);
                    if (!response.ok) throw new Error("Failed to fetch subtypes");
                    this.subtypes = await response.json();
                } catch (error) {
                    console.error(error);
                }
            },

            // Handle Create or Update
            async submitForm() {
                let payload = JSON.parse(JSON.stringify(this.form));
                
                try {
                    if (this.isEditing) {
                        const id = payload.id;
                        Object.keys(payload).forEach((k) => payload[k] === "" && delete payload[k]);
                        
                        const response = await fetch(`${this.userApi}/?id=${id}`, {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error("Failed to update user");
                    } else {
                        delete payload.id;
                        const response = await fetch(`${this.userApi}/`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error("Failed to create user");
                    }

                    this.resetForm();
                    await this.fetchUsers(); 
                } catch (error) {
                    console.error(error);
                    alert("Error saving user.");
                }
            },

            // Populate form for editing
            editUser(user) {
                this.isEditing = true;
                this.form = JSON.parse(JSON.stringify(user));
            },

            // Delete user
            async deleteUser(user) {
                if (!confirm(`Are you sure you want to delete ${user.first_name} ${user.last_name}?`)) return;

                try {
                    const response = await fetch(`${this.userApi}/?id=${user.id}`, {
                        method: "DELETE"
                    });

                    if (!response.ok) throw new Error("Failed to delete user");
                    await this.fetchUsers(); 
                } catch (error) {
                    console.error(error);
                    alert("Error deleting user.");
                }
            },

            // Reset form state
            resetForm() {
                this.isEditing = false;
                this.form = {
                    id: '',
                    organization_id: '',
                    type: 'customer',
                    subtype_id: '',
                    role: 'enduser',
                    first_name: '',
                    last_name: '',
                    email: '',
                    phone: ''
                };
            },

            // Helper: Get Organization Name from UUID
            getOrgName(orgId) {
                const org = this.organizations.find(o => o.id === orgId);
                return org ? org.name : orgId;
            },

            // Helper: Get Subtype Name from UUID
            getSubtypeName(subtypeId) {
                const subtype = this.subtypes.find(s => s.id === subtypeId);
                return subtype ? this.formatSubtypeName(subtype.name) : subtypeId;
            },

            // Helper: Format enum string to readable text (e.g., project_manager -> Project Manager)
            formatSubtypeName(name) {
                return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            },

            // Open integrations modal for a user
            openIntegrations(user) {
                const name = `${user.first_name} ${user.last_name}`;
                document.getElementById('intModalUserName').textContent = name;

                const mbStatus      = document.getElementById('mbStatus');
                const mbMemberships = document.getElementById('mbMemberships');
                const mbMsg         = document.getElementById('mbActionMsg');
                const teamsStatus   = document.getElementById('teamsStatus');
                const teamsMsg      = document.getElementById('teamsActionMsg');
                const slackStatus   = document.getElementById('slackStatus');
                const slackMsg      = document.getElementById('slackActionMsg');

                // Reset
                mbStatus.innerHTML = '<span class="text-muted">Loading…</span>';
                mbMemberships.innerHTML = '';
                mbMsg.textContent = '';
                teamsStatus.textContent = '—'; teamsMsg.textContent = '';
                slackStatus.textContent = '—'; slackMsg.textContent = '';

                // Always fetch live membership state from the API
                const loadMbMemberships = () => {
                    mbMemberships.innerHTML = '<span class="text-muted small">Loading memberships…</span>';
                    fetch(`/metabase/user/${user.id}/memberships`)
                        .then(async r => {
                            if (r.status === 404) {
                                // User not provisioned yet
                                mbStatus.innerHTML = '<span class="text-muted">Not provisioned in Metabase yet</span>';
                                mbMemberships.innerHTML = '';
                                return;
                            }
                            const data = await r.json();
                            mbStatus.innerHTML = `<span class="text-success">✓ Provisioned (Metabase ID: ${data.metabase_user_id})</span>`;
                            if (data.memberships && data.memberships.length > 0) {
                                mbMemberships.innerHTML = `
                                    <p class="small fw-semibold mb-1 text-muted">Group memberships</p>
                                    <table class="table table-sm table-bordered mb-0" style="font-size:0.85rem;">
                                        <thead class="table-light">
                                            <tr><th>Group</th><th style="width:90px;">Action</th></tr>
                                        </thead>
                                        <tbody>
                                            ${data.memberships.map(m => `
                                                <tr id="mb-row-${m.group_id}">
                                                    <td>${m.group_name}</td>
                                                    <td>
                                                        <button class="btn btn-sm btn-outline-danger"
                                                            onclick="removeFromMbGroup('${user.id}', ${m.group_id}, this)">
                                                            Remove
                                                        </button>
                                                    </td>
                                                </tr>`).join('')}
                                        </tbody>
                                    </table>`;
                            } else {
                                mbMemberships.innerHTML = '<p class="small text-muted mb-0">No group memberships yet.</p>';
                            }
                        })
                        .catch(() => {
                            mbStatus.innerHTML = '<span class="text-muted">Not provisioned in Metabase yet</span>';
                            mbMemberships.innerHTML = '';
                        });
                };

                loadMbMemberships();

                // Provision button — refreshes memberships after success
                const btnMb = document.getElementById('btnProvisionMb');
                btnMb.onclick = async () => {
                    btnMb.disabled = true; btnMb.textContent = 'Provisioning…';
                    mbMsg.textContent = ''; mbMsg.className = 'mt-2 small';
                    try {
                        const r = await fetch(`/metabase/user/${user.id}/provision`, { method: 'POST' });
                        const data = await r.json();
                        if (r.ok) {
                            mbMsg.textContent = data.created ? '✓ User created and added to group' : '✓ User already existed — added to group';
                            mbMsg.className = 'mt-2 small text-success';
                            loadMbMemberships(); // refresh live
                            await this.fetchUsers(); // sync Alpine data
                        } else {
                            mbMsg.textContent = '✗ ' + (data.detail || 'Error');
                            mbMsg.className = 'mt-2 small text-danger';
                        }
                    } catch(e) { mbMsg.textContent = '✗ Network error'; mbMsg.className = 'mt-2 small text-danger'; }
                    btnMb.disabled = false; btnMb.textContent = 'Provision to Metabase';
                };

                // Teams button
                const btnTeams = document.getElementById('btnAddTeams');
                btnTeams.onclick = async () => {
                    btnTeams.disabled = true; btnTeams.textContent = 'Adding…';
                    teamsMsg.textContent = ''; teamsMsg.className = 'mt-2 small';
                    try {
                        const r = await fetch(`/teams/user/${user.id}/add`, { method: 'POST' });
                        const data = await r.json();
                        if (r.ok) {
                            teamsMsg.textContent = `✓ Added to ${data.teams_group}`;
                            teamsMsg.className = 'mt-2 small text-success';
                            teamsStatus.textContent = `✓ Member of ${data.teams_group}`;
                            teamsStatus.className = 'mb-2 small text-success';
                        } else {
                            teamsMsg.textContent = '✗ ' + (data.detail || 'Error');
                            teamsMsg.className = 'mt-2 small text-danger';
                        }
                    } catch(e) { teamsMsg.textContent = '✗ Network error'; teamsMsg.className = 'mt-2 small text-danger'; }
                    btnTeams.disabled = false; btnTeams.textContent = 'Add to Teams';
                };

                // Slack button
                const btnSlack = document.getElementById('btnAddSlack');
                btnSlack.onclick = async () => {
                    btnSlack.disabled = true; btnSlack.textContent = 'Adding…';
                    slackMsg.textContent = ''; slackMsg.className = 'mt-2 small';
                    try {
                        const r = await fetch(`/slack/user/${user.id}/add`, { method: 'POST' });
                        const data = await r.json();
                        if (r.ok) {
                            slackMsg.textContent = `✓ Linked to ${data.slack_channel}`;
                            slackMsg.className = 'mt-2 small text-success';
                            slackStatus.textContent = `✓ Linked to ${data.slack_channel}`;
                            slackStatus.className = 'mb-2 small text-success';
                        } else {
                            slackMsg.textContent = '✗ ' + (data.detail || 'Error');
                            slackMsg.className = 'mt-2 small text-danger';
                        }
                    } catch(e) { slackMsg.textContent = '✗ Network error'; slackMsg.className = 'mt-2 small text-danger'; }
                    btnSlack.disabled = false; btnSlack.textContent = 'Add to Slack';
                };

                new bootstrap.Modal(document.getElementById('userIntegrationsModal')).show();
            },

            // Helper: Color code the Type badge
            getTypeBadgeColor(type) {
                switch(type) {
                    case 'customer': return 'primary';
                    case 'partner': return 'success';
                    case 'internal': return 'info';
                    default: return 'secondary';
                }
            }
        }
    }
</script>

<script>
    async function removeFromMbGroup(userId, groupId, btn) {
        if (!confirm('Remove this user from the Metabase group?')) return;
        btn.disabled = true;
        btn.textContent = 'Removing…';
        try {
            const r = await fetch(`/metabase/user/${userId}/group/${groupId}`, { method: 'DELETE' });
            if (r.ok) {
                // Remove the row from the table
                const row = document.getElementById(`mb-row-${groupId}`);
                if (row) row.remove();
                // If table body is now empty, show placeholder
                const tbody = document.querySelector('#mbMemberships tbody');
                if (tbody && tbody.children.length === 0) {
                    document.getElementById('mbMemberships').innerHTML =
                        '<p class="small text-muted mb-0">No group memberships yet.</p>';
                }
            } else {
                const data = await r.json().catch(() => ({}));
                alert('Failed to remove: ' + (data.detail || 'Unknown error'));
                btn.disabled = false;
                btn.textContent = 'Remove';
            }
        } catch(e) {
            alert('Network error');
            btn.disabled = false;
            btn.textContent = 'Remove';
        }
    }
</script>
</body>
</html>
